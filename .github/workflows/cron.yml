name: Monitor MLU

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

concurrency:
  group: monitor-mlu
  cancel-in-progress: false

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -s requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run monitor
        env:
          SCRAPFLY_KEY: ${{ secrets.SCRAPFLY_KEY }}
        run: python main.py

      - name: Commit updated state and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json reporte_latest.md
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "chore: update state and report [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Send success email
        if: success()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          python3 - <<'PYEOF'
          import smtplib, os, re
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.base import MIMEBase
          from email import encoders
          from pathlib import Path

          host     = os.environ["SMTP_HOST"]
          port     = int(os.environ["SMTP_PORT"])
          username = os.environ["SMTP_USERNAME"]
          password = os.environ["SMTP_PASSWORD"]
          to_addr  = os.environ["EMAIL_TO"]
          from_addr= os.environ["EMAIL_FROM"]

          report_path = Path("reporte_latest.md")
          report_text = report_path.read_text(encoding="utf-8") if report_path.exists() else "(sin reporte)"

          def count_section(text, header):
              lines = []
              in_section = False
              for line in text.splitlines():
                  if line.strip().startswith("## " + header):
                      in_section = True
                      continue
                  if in_section:
                      if line.startswith("## "):
                          break
                      if line.strip().startswith("- ") and "Sin novedades" not in line:
                          lines.append(line)
              return lines

          nuevas         = count_section(report_text, "Nuevas")
          confirmadas    = count_section(report_text, "Bajas confirmadas")
          pendientes     = count_section(report_text, "Bajas pendientes de confirmar")
          precios        = count_section(report_text, "Cambios de precio")
          salidas        = count_section(report_text, "Salidas probables")

          import json
          state = {}
          try:
              state = json.loads(Path("state.json").read_text())
          except Exception:
              pass
          items_total = len(state.get("items", {}))
          fecha = state.get("last_run_at", "?")

          resumen = f"""MLU Monitor Lite – Resumen diario

Fecha/hora: {fecha}
Sellers configurados: 15
Items en seguimiento: {items_total}

Novedades:
  Items nuevos:            {len(nuevas)}
  Bajas confirmadas:       {len(confirmadas)}
  Bajas pendientes:        {len(pendientes)}
  Cambios de precio:       {len(precios)}
  Salidas probables:       {len(salidas)}

---
Reporte completo adjunto.
"""

          msg = MIMEMultipart()
          msg["Subject"] = "MLU Monitor Lite – resumen diario"
          msg["From"]    = from_addr
          msg["To"]      = to_addr
          msg.attach(MIMEText(resumen, "plain", "utf-8"))

          if report_path.exists():
              part = MIMEBase("application", "octet-stream")
              part.set_payload(report_path.read_bytes())
              encoders.encode_base64(part)
              part.add_header("Content-Disposition", "attachment", filename="reporte_latest.md")
              msg.attach(part)

          with smtplib.SMTP(host, port) as s:
              s.starttls()
              s.login(username, password)
              s.sendmail(from_addr, [to_addr], msg.as_bytes())
          print("Email de éxito enviado.")
          PYEOF

      - name: Send failure email
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          python3 - <<'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText

          host     = os.environ["SMTP_HOST"]
          port     = int(os.environ["SMTP_PORT"])
          username = os.environ["SMTP_USERNAME"]
          password = os.environ["SMTP_PASSWORD"]
          to_addr  = os.environ["EMAIL_TO"]
          from_addr= os.environ["EMAIL_FROM"]

          cuerpo = """MLU Monitor Lite – ERROR en workflow

La corrida del monitor falló.

Revisá el detalle en:
https://github.com/trexxeseba/mlu-monitor-lite/actions

No se actualizaron state.json ni reporte_latest.md.
"""

          msg = MIMEText(cuerpo, "plain", "utf-8")
          msg["Subject"] = "MLU Monitor Lite – ERROR en workflow"
          msg["From"]    = from_addr
          msg["To"]      = to_addr

          with smtplib.SMTP(host, port) as s:
              s.starttls()
              s.login(username, password)
              s.sendmail(from_addr, [to_addr], msg.as_bytes())
          print("Email de error enviado.")
          PYEOF
