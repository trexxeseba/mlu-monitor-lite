name: Monitor MLU

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

concurrency:
  group: monitor-mlu
  cancel-in-progress: false

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -s requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run monitor
        env:
          SCRAPFLY_KEY: ${{ secrets.SCRAPFLY_KEY }}
        run: python main.py

      - name: Commit updated state and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add state.json reporte_latest.md
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "chore: update state and report [skip ci]"
            git push origin main
          fi
