name: Test Item URLs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-items:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install beautifulsoup4 requests
      - name: Run item URL test
        env:
          SCRAPFLY_KEY: ${{ secrets.SCRAPFLY_KEY }}
        run: python test_items.py
      - name: Upload results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test_items_result.json || true
          git diff --cached --quiet || git commit -m "test: item URL validation results"
          git push origin main || true
