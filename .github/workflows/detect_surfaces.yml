name: Detect Seller Surfaces

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run surface detection
        env:
          SCRAPFLY_KEY: ${{ secrets.SCRAPFLY_KEY }}
        run: python detect_surfaces.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add surface_detection_result.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git pull --rebase origin main
            git commit -m "chore: surface detection result [skip ci]"
            git push origin HEAD:main
          fi
